name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ripple
          POSTGRES_PASSWORD: ripple
          POSTGRES_DB: ripple_scout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ripple -d ripple_scout"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ripple:ripple@localhost:5432/ripple_scout?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:run
